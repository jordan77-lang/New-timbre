<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timbre Cube</title>
  <link rel="stylesheet" href="style.css">
  <!-- Tone.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.39/Tone.js"></script>
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <h1>Timbre Cube</h1>
  <p id="info">Press Place Marker to spawn a dot at the center, then drag it to explore the timbre space.</p>

  <main class="main-container">
    <div id="container" tabindex="0" aria-label="3D timbre cube visualizer">
    </div>

    <div class="spectro-section" aria-label="Spectrogram and controls">
      <canvas id="spectrograph" width="600" height="500" role="img"
        aria-label="Spectrogram visualization of current timbre">Your browser does not support canvas. A spectrogram
        visualization of the current timbre would appear here.</canvas>
      <div class="spectro-readouts" aria-live="polite">
        <div>
          <span class="readout-label">Centroid</span>
          <span class="readout-value" id="readout-centroid">--</span>
        </div>
        <div>
          <span class="readout-label">Noisiness</span>
          <span class="readout-value" id="readout-noisiness">--</span>
        </div>
        <div>
          <span class="readout-label">Inharmonicity</span>
          <span class="readout-value" id="readout-inharm">--</span>
        </div>
      </div>
      <div class="button-container">
        <button id="play-pause">⏸ Pause</button>
        <button id="place-marker">◉ Place Marker</button>
        <button id="clear">✕ Clear Marker</button>
        <button id="download">↓ Download</button>
        <button id="reset-position">⟲ Reset Cube Position</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
